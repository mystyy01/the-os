[build]
target = "x86_64-unknown-none"

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

# Static, non-PIE executable laid out at a fixed high virtual address by linker.ld.
# cwd during the build is this crate dir (it is its own workspace root), so the
# relative path resolves to user/hello/linker.ld.
[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=-no-pie",
    "-C", "link-arg=-Tlinker.ld",
]
